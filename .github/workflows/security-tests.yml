name: Security Tests

on:
  push:
    branches: [master]
  workflow_dispatch:   # esecuzione manuale dal sito GitHub

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install -r tests/requirements.txt

      - name: Unblock runner IP before tests
        env:
          DDNS_ADMIN_PASS: ${{ secrets.DDNS_ADMIN_PASS }}
        run: |
          # Login come admin e sblocca l'IP corrente
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "Runner IP: $RUNNER_IP"
          SESSION=$(curl -s -c /tmp/cookies.txt -b /tmp/cookies.txt \
            -d "username=admin&password=$DDNS_ADMIN_PASS" \
            -L https://ddns.gvweb.it/index.php -o /dev/null -w "%{http_code}")
          curl -s -c /tmp/cookies.txt -b /tmp/cookies.txt \
            -d "action=unblock_ip&ip=$RUNNER_IP" \
            https://ddns.gvweb.it/admin.php > /dev/null
          echo "IP sbloccato: $RUNNER_IP"

      - name: Run security tests
        env:
          DDNS_ADMIN_PASS: ${{ secrets.DDNS_ADMIN_PASS }}
          DDNS_TEST_PASS: ${{ secrets.DDNS_TEST_PASS }}
        run: |
          cd tests
          sed -i "s/la-tua-password-admin/$DDNS_ADMIN_PASS/" config.py
          sed -i "s/test10/$DDNS_TEST_PASS/" config.py
          pytest test_security.py -v --tb=short
